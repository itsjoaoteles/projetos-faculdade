<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Projetos</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #2c2c2c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        .pagina {
            display: none;
        }

        .ativa {
            display: block;
        }

        h1 {
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
        }

        .nav {
            margin-top: 30px;
            font-size: 30px;
            cursor: pointer;
        }

        .nav span {
            margin: 0 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Página 1 -->
    <div class="pagina ativa">
        <h1>🐾 Projeto 1</h1>
        <p>Página do caco</p>
        <a href="caco/caco.html">caco</a>
    </div>

    <!-- Página 2 -->
    <div class="pagina">
        <h1>💌 Projeto 2</h1>
        <p>Carta para minha mãe</p>
        <a href="Mamis/Mamis.html">Mamis</a>
    </div>

    <!-- Página 3 -->
    <div class="pagina">
        <h1>🧮 Projeto 3</h1>
        <p>Calculadora</p>
        <a href="Calculadora/Calculadora.html">Calculadora</a>
    </div>

    <!-- Navegação -->
    <div class="nav">
        <span onclick="anterior()">⬅</span>
        <span onclick="proxima()">➡</span>
    </div>

</div>

<script>
    let paginaAtual = 0;
    const paginas = document.querySelectorAll(".pagina");

    function mostrarPagina(index) {
        paginas.forEach(p => p.classList.remove("ativa"));
        paginas[index].classList.add("ativa");
    }

    function proxima() {
        paginaAtual++;
        if (paginaAtual >= paginas.length) paginaAtual = 0;
        mostrarPagina(paginaAtual);
    }

    function anterior() {
        paginaAtual--;
        if (paginaAtual < 0) paginaAtual = paginas.length - 1;
        mostrarPagina(paginaAtual);
    }
</script>

</body>
</html>
